<svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dunkler Hintergrund -->
    <radialGradient id="bgTW3b" cx="0.5" cy="0.3" r="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <!-- Cyan-Halo -->
    <radialGradient id="haloTW3b" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Macro-Line Akzent -->
    <linearGradient id="macroTW3b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Basis-Kreis -->
  <circle cx="48" cy="48" r="40" fill="url(#bgTW3b)"/>

  <!-- Cyan-Halo -->
  <circle cx="48" cy="48" r="30" fill="url(#haloTW3b)"/>

  <!-- TW zentriert und etwas größer -->
  <g transform="translate(24,30)" stroke="#e5e7eb" stroke-width="4"
     stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- T -->
    <line x1="0" y1="0" x2="22" y2="0"/>
    <line x1="11" y1="0" x2="11" y2="20"/>

    <!-- W -->
    <polyline points="28,0 32,20 38,8 44,20 48,0"/>
  </g>

  <!-- Macro-/Click-Linie unten, damit man "Automation/Makro" erkennt -->
  <path
    d="M20 62
       L26 62
       L30 56
       L36 68
       L42 54
       L50 70
       L56 58
       L64 62
       L76 62"
    fill="none"
    stroke="url(#macroTW3b)"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
